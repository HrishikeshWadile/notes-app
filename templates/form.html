<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Sharing App - Submit</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f5f5f5;
        }

        .container {
            width: 400px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Submit Your Note</h2>

        <form action="/submit" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>

            <input type="number" name="rating" placeholder="Rating (1-5)" min="1" max="5" required>

            <textarea name="comment" placeholder="Your Note / Comment" required></textarea>

            <button type="submit">Submit</button>
        </form>

        <br>
        <a href="/responses">View All Notes</a>
    </div>

</body>

</html>
