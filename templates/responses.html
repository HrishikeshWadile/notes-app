<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Notes</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f5f5f5;
        }

        .container {
            width: 600px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
        }

        .rating {
            color: orange;
            font-weight: bold;
        }

        a {
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>All Submitted Notes</h2>

        <a href="/">➕ Add New Note</a>

        {% for item in data %}
        <div class="card">
            <h3>{{ item.name }}</h3>
            <p class="rating">Rating: {{ item.rating }}/5</p>
            <p>{{ item.comment }}</p>
        </div>
        {% endfor %}

    </div>

</body>

</html>
